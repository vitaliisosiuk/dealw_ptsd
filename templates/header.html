<header id="main-header" class="fixed top-0 left-0 w-full z-50 flex justify-between items-center p-6 text-white transition-all duration-500 bg-transparent">
    <div class="text-center text-2xl font-bold tracking-tighter">Deal with <br>PTSD</div>
    <nav class="space-x-8">
        <a href="#" class="text-sm font-medium hover:opacity-70 transition-opacity">Знайоство з ПТСР</a>
        <a href="#" class="text-sm font-medium hover:opacity-70 transition-opacity">Про нас</a>
        <a href="#" class="text-sm font-medium hover:opacity-70 transition-opacity">Контакти</a>
    </nav>
</header>

<script>
    const header = document.getElementById('main-header');

    window.addEventListener('scroll', () => {
        if (window.scrollY > 50) {
            header.classList.remove('bg-transparent', 'py-6');
            header.classList.add('bg-[#5a2d4a]/80', 'backdrop-blur-md', 'py-4', 'shadow-2xl');
        } else {
            header.classList.add('bg-transparent', 'py-6');
            header.classList.remove('bg-[#5a2d4a]/80', 'backdrop-blur-md', 'py-4', 'shadow-2xl');
        }
    });
</script>
