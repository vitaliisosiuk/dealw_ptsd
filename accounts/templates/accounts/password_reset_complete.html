{% extends "base.html" %}

{% block title %}
    Змінити пароль
{% endblock %}

{% block header_classes %}bg-[#5a2d4a] py-4 shadow-md{% endblock %}
{% block header_script %}{% endblock %}

{% block content %}
    <div class="min-h-[80vh] flex items-center justify-center px-4 pt-32 pb-20">
        <div class="max-w-md w-full text-center space-y-6 bg-white p-10 rounded-3xl shadow-sm border border-gray-100">
            <h2 class="text-3xl font-bold text-[#5a2d4a]">Пароль змінено!</h2>
            <p class="text-gray-600">Ваш пароль успішно відновлено.</p>
            <a href="{% url 'accounts:login' %}" class="inline-block mt-4 px-6 py-3 bg-[#89b83a] text-white font-medium rounded-xl hover:bg-[#7ca833] transition-all">Увійти</a>
        </div>
    </div>
{% endblock %}
