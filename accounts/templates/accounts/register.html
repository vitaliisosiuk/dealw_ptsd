{% extends "base.html" %}

{% block content %}
    <div class="min-h-[80vh] flex items-center justify-center px-4 pt-32 pb-20">
        <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-3xl shadow-sm border border-gray-100">
            <div>
                <h2 class="text-center text-3xl font-bold text-[#5a2d4a]">
                    Створення акаунта
                </h2>
                <p class="mt-3 text-center text-sm text-gray-600">
                    Або
                    <a href="{% url 'accounts:login' %}" class="font-medium text-[#89b83a] hover:text-[#7ca833] transition-colors">
                        увійдіть, якщо вже маєте акаунт
                    </a>
                </p>
            </div>

            <!-- Форма -->
            <form class="mt-8 space-y-6" method="POST">
                {% csrf_token %}

                <div class="space-y-5">
                    {% for field in form %}
                        <div>
                            <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
                                {{ field.label }}
                            </label>

                            {{ field }}

                            {% for error in field.errors %}
                                <p class="text-sm text-red-500 mt-1">{{ error }}</p>
                            {% endfor %}
                        </div>
                    {% endfor %}
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full flex justify-center py-3.5 px-4 text-base font-medium rounded-xl text-white bg-[#89b83a] hover:bg-[#7ca833] transition-all shadow-sm hover:shadow-md transform hover:-translate-y-0.5">
                        Зареєструватися
                    </button>
                </div>
            </form>

        </div>
    </div>
{% endblock content %}
